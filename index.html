<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>RC Premium Controller V2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap');

:root {
  --bg: #030712;
  --panel: rgba(17, 24, 39, 0.75);
  --border: rgba(255, 255, 255, 0.08);
  --blue: #00d2ff;
  --green: #10b981;
  --red: #ef4444;
  --orange: #f59e0b;
  --purple: #8b5cf6;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100vw; height:100vh; background:var(--bg); overflow:hidden; font-family:'Rajdhani', sans-serif; user-select:none; color: #fff; }
body::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background: 
    radial-gradient(circle at 50% 50%, rgba(0, 210, 255, 0.05) 0%, transparent 60%),
    linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
  background-size: 100% 100%, 30px 30px, 30px 30px; z-index:0;
}

/* ── TOPBAR ── */
#topbar {
  position:fixed; top:0; left:0; right:0; height:max(60px, env(safe-area-inset-top));
  display:flex; align-items:center; justify-content:space-between;
  padding:env(safe-area-inset-top) max(16px, env(safe-area-inset-right)) 0 max(16px, env(safe-area-inset-left));
  background:var(--panel); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border); z-index:200; box-shadow:0 4px 30px rgba(0,0,0,0.6); gap:12px;
}
#connect-area { display:flex; align-items:center; gap:10px; }
#dot { width:12px; height:12px; border-radius:50%; background:var(--red); box-shadow:0 0 12px var(--red); transition:0.3s; }
#dot.on { background:var(--green); box-shadow:0 0 15px var(--green); }
#conn-label { font-size:14px; letter-spacing:2px; font-weight:700; color:#9ca3af; }
#conn-btn {
  background:rgba(255,255,255,0.05); border:1px solid var(--border); color:#d1d5db;
  padding:6px 14px; font-family:inherit; font-size:12px; letter-spacing:1px;
  cursor:pointer; border-radius:8px; font-weight:700; transition:0.2s;
}
#conn-btn.on { border-color:var(--red); color:var(--red); background:rgba(239, 68, 68, 0.1); }
#conn-btn:active { transform:scale(0.95); }

#speed-bar { display:flex; align-items:center; gap:8px; flex:1; justify-content:center; }
#speed-bar label { font-size:12px; letter-spacing:2px; color:#9ca3af; font-weight:600; }
#speed-slider { -webkit-appearance:none; appearance:none; width:100%; max-width:150px; height:6px; background:rgba(255,255,255,0.1); border-radius:3px; outline:none; }
#speed-slider::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:var(--blue); box-shadow:0 0 12px var(--blue); cursor:pointer; }
#speed-val { font-size:13px; color:var(--blue); min-width:40px; font-weight:700; }

#top-right { display:flex; gap:8px; }
.icon-btn {
  width:40px; height:40px; border-radius:10px; border:1px solid var(--border);
  background:rgba(255,255,255,0.03); color:#9ca3af; display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:0.2s;
}
.icon-btn svg { width:20px; height:20px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.icon-btn:active { transform:scale(0.9); }
.icon-btn.active { border-color:var(--orange); color:var(--orange); box-shadow:inset 0 0 15px rgba(245, 158, 11, 0.2); }
.icon-btn.mode-active { border-color:var(--purple); color:var(--purple); box-shadow:0 0 15px rgba(139, 92, 246, 0.3); }

/* ── CENTER SPEED DISPLAY ── */
#speed-display { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; pointer-events:none; z-index:10; }
#speed-num { font-size:110px; font-weight:700; color:rgba(255,255,255,0.03); line-height:1; transition:0.2s; }
#speed-num.fwd { color:var(--green); text-shadow:0 0 50px rgba(16, 185, 129, 0.4); }
#speed-num.bwd { color:var(--red); text-shadow:0 0 50px rgba(239, 68, 68, 0.4); }
#speed-lbl { font-size:14px; letter-spacing:6px; color:rgba(255,255,255,0.2); margin-top:5px; font-weight:600; }

/* ── DRAGGABLE ELEMENTS (Joysticks & Buttons) ── */
.draggable { position:fixed; z-index:50; touch-action:none; display:flex; align-items:center; justify-content:center; transform-origin:center; }
.draggable.editing { cursor:move; z-index:200; outline:2px dashed rgba(255,255,255,0.3); border-radius:12px; background:rgba(255,255,255,0.05); }
.draggable.editing.selected { outline:2px solid var(--orange); box-shadow:0 0 20px rgba(245, 158, 11, 0.3); }

/* ── JOYSTICKS ── */
.joystick-base {
  width:140px; height:140px; border-radius:50%; border:2px solid var(--border);
  background:radial-gradient(circle, rgba(255,255,255,0.03), rgba(0,0,0,0.6));
  backdrop-filter:blur(8px); box-shadow:0 10px 30px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.05);
  position:relative; display:flex; align-items:center; justify-content:center; pointer-events:auto;
}
.joystick-base.active { border-color:rgba(0,210,255,0.5); box-shadow:0 0 25px rgba(0,210,255,0.2); }
.joystick-knob {
  width:56px; height:56px; border-radius:50%;
  background:linear-gradient(135deg, rgba(255,255,255,0.2), rgba(0,0,0,0.8));
  border:1px solid rgba(255,255,255,0.3); box-shadow:0 5px 15px rgba(0,0,0,0.9);
  position:absolute; pointer-events:none; transition:background 0.1s;
}
.joystick-label { position:absolute; bottom:-25px; font-size:11px; letter-spacing:3px; color:rgba(255,255,255,0.4); font-weight:700; white-space:nowrap; pointer-events:none;}

/* ── WIDGET BUTTONS ── */
.control-btn {
  border:1px solid var(--border); background:linear-gradient(145deg, rgba(255,255,255,0.08), rgba(0,0,0,0.6));
  backdrop-filter:blur(8px); box-shadow:0 8px 20px rgba(0,0,0,0.6);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px;
  cursor:pointer; transition:0.1s; color:#9ca3af; border-radius:50%; pointer-events:auto;
}
.control-btn svg { stroke:currentColor; fill:none; pointer-events:none; }
.btn-label { font-size:10px; letter-spacing:2px; font-weight:700; pointer-events:none; }

.draggable[data-icon="left"] .control-btn, .draggable[data-icon="right"] .control-btn { width:70px; height:70px; color:var(--blue); }
.draggable[data-icon="left"] .control-btn.pressed, .draggable[data-icon="right"] .control-btn.pressed { border-color:var(--blue); background:rgba(0,210,255,0.15); box-shadow:0 0 30px rgba(0,210,255,0.4); transform:scale(0.92); }
.draggable[data-icon="gas"] .control-btn { width:70px; height:90px; border-radius:16px; color:var(--green); }
.draggable[data-icon="gas"] .control-btn.pressed { border-color:var(--green); background:rgba(16,185,129,0.15); box-shadow:0 0 30px rgba(16,185,129,0.4); transform:translateY(4px) scale(0.92); }
.draggable[data-icon="brake"] .control-btn { width:80px; height:90px; border-radius:16px; color:var(--red); }
.draggable[data-icon="brake"] .control-btn.pressed { border-color:var(--red); background:rgba(239,68,68,0.15); box-shadow:0 0 30px rgba(239,68,68,0.4); transform:translateY(4px) scale(0.92); }

/* ── PANELS ── */
.overlay { position:fixed; inset:0; z-index:290; display:none; }
.overlay.show { display:block; }
.panel {
  position:fixed; background:var(--panel); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  border:1px solid var(--border); border-radius:16px; padding:20px; z-index:300;
  box-shadow:0 15px 50px rgba(0,0,0,0.8); display:none; flex-direction:column; gap:16px; min-width:260px;
}
.panel.show { display:flex; animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
@keyframes popIn { 0%{opacity:0; transform:scale(0.9);} 100%{opacity:1; transform:scale(1);} }
.panel-header { display:flex; justify-content:space-between; align-items:center; }
.panel-title { font-size:13px; letter-spacing:3px; color:#fff; font-weight:700; display:flex; align-items:center; gap:8px;}
.close-panel { background:none; border:none; color:#9ca3af; font-size:18px; cursor:pointer; padding:4px; border-radius:50%; }
.close-panel:active { color:#fff; background:rgba(255,255,255,0.1); }
.panel-row { display:flex; align-items:center; justify-content:space-between; gap:12px; }
.panel-btn { background:rgba(255,255,255,0.05); border:1px solid var(--border); color:#fff; padding:10px 16px; font-family:inherit; font-size:12px; letter-spacing:2px; cursor:pointer; border-radius:8px; font-weight:700; transition:0.2s; text-transform:uppercase; }
.panel-btn:active { background:rgba(255,255,255,0.1); transform:scale(0.95); }

/* Gyro Extras */
#gyro-panel { top:max(70px, calc(env(safe-area-inset-top)+20px)); right:16px; }
#gyro-level-bg { width:100%; height:10px; background:rgba(0,0,0,0.6); border-radius:5px; border:1px solid rgba(255,255,255,0.1); position:relative; overflow:hidden; }
#gyro-level-ind { position:absolute; top:0; left:50%; width:24px; height:100%; background:var(--blue); margin-left:-12px; border-radius:5px; box-shadow:0 0 12px var(--blue); transition:transform 0.1s linear; }
#gyro-level-bg::after { content:''; position:absolute; top:0; left:50%; width:2px; height:100%; background:rgba(255,255,255,0.6); transform:translateX(-50%); }
#gyro-tilt { font-size:13px; color:#9ca3af; letter-spacing:2px; font-weight:600; text-align:center; }

/* Custom Toggle */
.tsw { position:relative; width:44px; height:24px; cursor:pointer; flex-shrink:0; }
.tsw-track { position:absolute; inset:0; background:rgba(255,255,255,0.1); border-radius:12px; border:1px solid rgba(255,255,255,0.1); transition:0.3s; }
.tsw-knob { position:absolute; top:3px; left:3px; width:16px; height:16px; border-radius:50%; background:#9ca3af; transition:0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.tsw.on .tsw-track { background:rgba(0,210,255,0.3); border-color:var(--blue); }
.tsw.on .tsw-knob { left:23px; background:var(--blue); box-shadow:0 0 10px var(--blue); }

/* ── EDIT TOOLBAR ── */
#edit-toolbar {
  position:fixed; bottom:max(20px, env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
  background:var(--panel); border:1px solid var(--orange); padding:12px 24px; border-radius:24px;
  display:none; align-items:center; gap:16px; z-index:300; box-shadow:0 10px 40px rgba(0,0,0,0.8);
  backdrop-filter:blur(16px);
}
#edit-toolbar span { font-size:12px; font-weight:700; color:var(--orange); letter-spacing:2px; }
#edit-slider { width:120px; }
#edit-done-btn { background:var(--orange); border:none; color:#000; padding:6px 16px; border-radius:12px; font-weight:700; cursor:pointer; }

/* ── CAMERA ── */
#cam-panel { position:fixed; inset:0; background:#000; z-index:400; display:none; flex-direction:column; align-items:center; justify-content:center; }
#cam-panel.show { display:flex; }
#cam-video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
#cam-canvas { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
#cam-overlay { position:absolute; top:20px; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; gap:5px; }
#finger-count-display { font-size:80px; font-weight:700; color:var(--green); text-shadow:0 0 40px rgba(16,185,129,0.8); line-height:1; }
#gesture-label { font-size:14px; letter-spacing:4px; color:rgba(255,255,255,0.9); font-weight:700; background:rgba(0,0,0,0.5); padding:4px 12px; border-radius:8px;}
#cam-close { position:absolute; top:max(20px,env(safe-area-inset-top)); right:20px; width:48px; height:48px; border-radius:50%; background:rgba(0,0,0,0.7); border:1px solid rgba(255,255,255,0.4); color:#fff; cursor:pointer; font-size:24px; z-index:10; }
</style>
</head>
<body>

<div id="topbar">
  <div id="connect-area">
    <div id="dot"></div>
    <span id="conn-label">DISCONNECTED</span>
    <button id="conn-btn" onclick="toggleConnect()">CONNECT</button>
  </div>
  <div id="speed-bar">
    <label>PWR</label>
    <input type="range" id="speed-slider" min="10" max="100" value="70" oninput="updateSpeed(this.value)">
    <span id="speed-val">70%</span>
  </div>
  <div id="top-right">
    <button class="icon-btn" id="gyro-btn" onclick="openPanel('gyro-panel')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg></button>
    <button class="icon-btn" id="cam-btn" onclick="openCamera()"><svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></button>
    <button class="icon-btn" id="edit-btn" onclick="toggleEditMode()"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button>
    <button class="icon-btn" onclick="goFullscreen()"><svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg></button>
  </div>
</div>

<div id="speed-display">
  <div id="speed-num">0</div>
  <div id="speed-lbl">THROTTLE</div>
</div>

<div class="overlay" id="panel-overlay" onclick="closeAllPanels()"></div>

<div class="panel" id="gyro-panel">
  <div class="panel-header">
    <div class="panel-title">⟳ GYROSCOPE</div>
    <button class="close-panel" onclick="closeAllPanels()">✕</button>
  </div>
  <div class="panel-row">
    <span id="gyro-txt" style="font-size:12px; font-weight:700; color:#9ca3af;">STATUS: OFF</span>
    <button class="panel-btn" onclick="toggleGyroState()" id="gyro-toggle-btn" style="border-color:var(--blue); color:var(--blue);">START</button>
  </div>
  <div id="gyro-level-bg"><div id="gyro-level-ind"></div></div>
  <div id="gyro-tilt">TILT: 0°</div>
  <hr style="border:none; border-top:1px solid var(--border); margin:4px 0;">
  <div class="panel-row">
    <span style="font-size:11px; font-weight:700; color:#9ca3af; letter-spacing:1px;">INVERT AXIS</span>
    <div class="tsw" id="gyro-invert-sw" onclick="gyroInvert=!gyroInvert;this.classList.toggle('on')">
      <div class="tsw-track"></div><div class="tsw-knob"></div>
    </div>
  </div>
  <button class="panel-btn" style="width:100%;" onclick="calibrateGyro()">SET CENTER (0°)</button>
</div>

<div id="cam-panel">
  <video id="cam-video" autoplay playsinline muted></video>
  <canvas id="cam-canvas"></canvas>
  <div id="cam-overlay">
    <div id="finger-count-display">–</div>
    <div id="gesture-label">SHOW YOUR HAND</div>
  </div>
  <button id="cam-close" onclick="closeCamera()">✕</button>
</div>

<div id="edit-toolbar">
  <span>SCALE</span>
  <input type="range" id="edit-slider" min="0.5" max="2" step="0.05" value="1" oninput="updateSelectedScale(this.value)">
  <button id="edit-done-btn" onclick="toggleEditMode()">DONE</button>
</div>

<div class="draggable" id="joy-steer-wrap" style="bottom:40px; left:40px;" data-scale="1">
  <div class="joystick-base" id="joy-steer-base">
    <div class="joystick-knob" id="joy-steer-knob"></div>
    <span class="joystick-label">STEER</span>
  </div>
</div>

<div class="draggable" id="joy-throttle-wrap" style="bottom:40px; right:40px;" data-scale="1">
  <div class="joystick-base" id="joy-throttle-base">
    <div class="joystick-knob" id="joy-throttle-knob"></div>
    <span class="joystick-label">THROTTLE</span>
  </div>
</div>

<div class="draggable" id="btn-left" data-icon="left" style="display:none; bottom:60px; left:30px;" data-scale="1"><div class="control-btn"></div></div>
<div class="draggable" id="btn-right" data-icon="right" style="display:none; bottom:60px; left:120px;" data-scale="1"><div class="control-btn"></div></div>
<div class="draggable" id="btn-brake" data-icon="brake" style="display:none; bottom:60px; right:120px;" data-scale="1"><div class="control-btn"></div></div>
<div class="draggable" id="btn-gas" data-icon="gas" style="display:none; bottom:60px; right:30px;" data-scale="1"><div class="control-btn"></div></div>

<script>
// ==================== STATE VARIABLES ====================
let ws = null, connected = false, sendTimer = null;
const ESP_IP = '192.168.4.1'; 
let throttleVal = 0, steerVal = 0, speedMul = 0.7;

// Edit & Layout State
let editMode = false, selectedEl = null;
let dragStartX = 0, dragStartY = 0, elStartX = 0, elStartY = 0;

// Modules State
let gyroOn = false, gyroInvert = false, centerBeta = 0, centerGamma = 0;
let gestureMode = false, cameraStream = null, handsModel = null, lastFingerCount = -1;

// ==================== WEBSOCKET ====================
function toggleConnect() {
  if (connected) { ws && ws.close(); return; }
  try {
    ws = new WebSocket(`ws://${ESP_IP}/ws`);
    ws.onopen = () => {
      connected = true;
      document.getElementById('dot').classList.add('on');
      document.getElementById('conn-label').textContent = 'CONNECTED';
      document.getElementById('conn-btn').textContent = 'DISCONNECT';
      document.getElementById('conn-btn').classList.add('on');
      clearInterval(sendTimer);
      sendTimer = setInterval(sendData, 50);
    };
    ws.onclose = ws.onerror = () => {
      connected = false; ws = null; clearInterval(sendTimer);
      throttleVal = steerVal = 0;
      document.getElementById('dot').classList.remove('on');
      document.getElementById('conn-label').textContent = 'DISCONNECTED';
      document.getElementById('conn-btn').textContent = 'CONNECT';
      document.getElementById('conn-btn').classList.remove('on');
      updateUI();
    };
  } catch(e) {}
}

function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }

function sendData() {
  const t = Math.round(throttleVal * speedMul);
  const s = Math.round(steerVal);
  const L = clamp(t + s, -100, 100);
  const R = clamp(t - s, -100, 100);
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(`${L},${R}`);
  updateUI(t, s);
}

function updateSpeed(v) { speedMul = v/100; document.getElementById('speed-val').textContent = v+'%'; }
function updateUI(t=0, s=0) {
  const el = document.getElementById('speed-num');
  el.textContent = Math.abs(t);
  el.className = t > 5 ? 'fwd' : (t < -5 ? 'bwd' : '');
}

// ==================== LAYOUT & EDIT MODE ====================
function toggleEditMode() {
  editMode = !editMode;
  document.getElementById('edit-btn').classList.toggle('active', editMode);
  document.getElementById('edit-toolbar').style.display = editMode ? 'flex' : 'none';
  
  const draggables = document.querySelectorAll('.draggable');
  draggables.forEach(el => {
    el.classList.toggle('editing', editMode);
    if (!editMode) el.classList.remove('selected');
  });
  
  if (!editMode) {
    selectedEl = null;
    saveLayout();
  }
}

function selectElement(el) {
  if (!editMode) return;
  document.querySelectorAll('.draggable').forEach(e => e.classList.remove('selected'));
  selectedEl = el;
  el.classList.add('selected');
  const scale = parseFloat(el.getAttribute('data-scale')) || 1;
  document.getElementById('edit-slider').value = scale;
}

function updateSelectedScale(val) {
  if (!selectedEl) return;
  selectedEl.setAttribute('data-scale', val);
  selectedEl.style.transform = `scale(${val})`;
}

// Dragging Logic
document.addEventListener('touchstart', e => {
  if (!editMode) return;
  const target = e.target.closest('.draggable');
  if (target) {
    e.preventDefault(); // Prevent accidental scroll/click
    selectElement(target);
    const touch = e.touches[0];
    dragStartX = touch.clientX;
    dragStartY = touch.clientY;
    const rect = target.getBoundingClientRect();
    // Use offset to prevent jumping
    elStartX = rect.left;
    elStartY = rect.top;
  }
}, {passive:false});

document.addEventListener('touchmove', e => {
  if (!editMode || !selectedEl) return;
  e.preventDefault();
  const touch = e.touches[0];
  const dx = touch.clientX - dragStartX;
  const dy = touch.clientY - dragStartY;
  
  selectedEl.style.left = (elStartX + dx) + 'px';
  selectedEl.style.top = (elStartY + dy) + 'px';
  selectedEl.style.right = 'auto';
  selectedEl.style.bottom = 'auto';
}, {passive:false});

// Save / Load
function saveLayout() {
  const layout = {};
  document.querySelectorAll('.draggable').forEach(el => {
    layout[el.id] = {
      left: el.style.left, top: el.style.top, right: el.style.right, bottom: el.style.bottom,
      scale: el.getAttribute('data-scale')
    };
  });
  localStorage.setItem('rc_v5_layout', JSON.stringify(layout));
}

function loadLayout() {
  try {
    const data = JSON.parse(localStorage.getItem('rc_v5_layout'));
    if (!data) return;
    for (let id in data) {
      const el = document.getElementById(id);
      if (el) {
        el.style.left = data[id].left; el.style.top = data[id].top;
        el.style.right = data[id].right; el.style.bottom = data[id].bottom;
        const scale = data[id].scale || 1;
        el.setAttribute('data-scale', scale);
        el.style.transform = `scale(${scale})`;
      }
    }
  } catch(e){}
}

// ==================== JOYSTICK LOGIC ====================
function setupJoystick(wrapper, base, knob, axis) {
  let active = false, touchId = null, cx = 0, cy = 0;
  const RADIUS = () => (base.offsetWidth / 2) - (knob.offsetWidth / 2);

  function start(px, py, id) {
    if (editMode) return;
    active = true; touchId = id;
    const rect = base.getBoundingClientRect();
    cx = rect.left + rect.width / 2;
    cy = rect.top + rect.height / 2;
    base.classList.add('active');
    move(px, py);
  }

  function move(px, py) {
    if (!active) return;
    const scale = parseFloat(wrapper.getAttribute('data-scale')) || 1;
    // Adjust touch math for scale
    const dx = (px - cx) / scale;
    const dy = (py - cy) / scale;
    
    const dist = Math.sqrt(dx*dx + dy*dy);
    const R = RADIUS();
    const clamped = Math.min(dist, R);
    const angle = Math.atan2(dy, dx);
    
    const kx = Math.cos(angle) * clamped;
    const ky = Math.sin(angle) * clamped;
    
    knob.style.transform = `translate(${kx}px, ${ky}px)`;
    
    const nx = kx / R; // -1 to 1
    const ny = -ky / R; // -1 to 1 (Up is positive)

    if (axis === 'steer' && !gyroOn) {
      steerVal = Math.round(clamp(nx * 100, -100, 100));
    } else if (axis === 'throttle') {
      throttleVal = Math.round(clamp(ny * 100, -100, 100));
    }
  }

  function end() {
    active = false; touchId = null;
    knob.style.transform = `translate(0px, 0px)`;
    base.classList.remove('active');
    if (axis === 'steer' && !gyroOn) steerVal = 0;
    if (axis === 'throttle') throttleVal = 0;
  }

  base.addEventListener('touchstart', e => { e.preventDefault(); const t=e.changedTouches[0]; start(t.clientX, t.clientY, t.identifier); }, {passive:false});
  document.addEventListener('touchmove', e => { if(!active)return; for(let t of e.changedTouches){ if(t.identifier===touchId){ e.preventDefault(); move(t.clientX, t.clientY); }}}, {passive:false});
  document.addEventListener('touchend', e => { if(!active)return; for(let t of e.changedTouches){ if(t.identifier===touchId) end(); }});
  document.addEventListener('touchcancel', e => { if(active) end(); });
}

setupJoystick(document.getElementById('joy-steer-wrap'), document.getElementById('joy-steer-base'), document.getElementById('joy-steer-knob'), 'steer');
setupJoystick(document.getElementById('joy-throttle-wrap'), document.getElementById('joy-throttle-base'), document.getElementById('joy-throttle-knob'), 'throttle');

function openPanel(id) {

// ==================== GYROSCOPE ====================
function toggleGyroState() {
  if(gyroOn) {
    window.removeEventListener('deviceorientation', onGyro);
    gyroOn = false; steerVal = 0;
    document.getElementById('gyro-txt').textContent = 'STATUS: OFF';
    document.getElementById('gyro-toggle-btn').textContent = 'START';
    document.getElementById('gyro-toggle-btn').style.borderColor = 'var(--blue)';
    document.getElementById('gyro-toggle-btn').style.color = 'var(--blue)';
    document.getElementById('gyro-btn').classList.remove('active');
    document.getElementById('gyro-level-ind').style.transform = `translateX(0px)`;
  } else {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission().then(r => { if(r==='granted') startGyro(); }).catch(console.error);
    } else { startGyro(); }
  }
}

function startGyro() {
  window.addEventListener('deviceorientation', onGyro);
  gyroOn = true;
  document.getElementById('gyro-txt').textContent = 'STATUS: ACTIVE';
  document.getElementById('gyro-toggle-btn').textContent = 'STOP';
  document.getElementById('gyro-toggle-btn').style.borderColor = 'var(--red)';
  document.getElementById('gyro-toggle-btn').style.color = 'var(--red)';
  document.getElementById('gyro-btn').classList.add('active');
}

function calibrateGyro() {
  window.addEventListener('deviceorientation', function calib(e) {
    centerBeta = e.beta || 0; centerGamma = e.gamma || 0;
    window.removeEventListener('deviceorientation', calib);
    const txt = document.getElementById('gyro-txt');
    txt.textContent = 'CENTER SET ✓';
    setTimeout(() => { if(gyroOn) txt.textContent = 'STATUS: ACTIVE'; else txt.textContent = 'STATUS: OFF'; }, 1500);
  }, {once:true});
}

function onGyro(e) {
  if (!gyroOn) return;
  const isLand = window.innerWidth > window.innerHeight;
  const orientation = (screen.orientation || {}).angle || window.orientation || 0;
  let diffBeta  = (e.beta  || 0) - centerBeta;
  let diffGamma = (e.gamma || 0) - centerGamma;
  let tilt = isLand ? (orientation === -90 ? -diffBeta : diffBeta) : diffGamma;
  if (gyroInvert) tilt = -tilt;
  const dead = 5;
  let g = Math.abs(tilt) < dead ? 0 : tilt - Math.sign(tilt) * dead;
  steerVal = clamp(Math.round(g * 2.5), -100, 100);
  document.getElementById('gyro-tilt').textContent = `TILT: ${Math.round(tilt)}°`;
  document.getElementById('gyro-level-ind').style.transform = `translateX(${clamp(tilt/45, -1, 1)*50}%)`;
}

// ==================== MEDIAPIPE GESTURE ====================
async function openCamera() {
  if (editMode) return;
  document.getElementById('cam-panel').classList.add('show');
  gestureMode = true;
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user', width:640, height:480}});
    const video = document.getElementById('cam-video');
    video.srcObject = cameraStream;
    await video.play();
    loadHandModel(video);
  } catch(e) {}
}

function closeCamera() {
  gestureMode = false;
  document.getElementById('cam-panel').classList.remove('show');
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
  throttleVal = steerVal = 0;
}

async function loadHandModel(video) {
  if (!window.Hands) {
    await new Promise(r => { const s=document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js'; s.onload=r; document.head.appendChild(s);});
    await new Promise(r => { const s=document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js'; s.onload=r; document.head.appendChild(s);});
  }
  const canvas = document.getElementById('cam-canvas'), ctx = canvas.getContext('2d');
  handsModel = new Hands({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${f}`});
  handsModel.setOptions({maxNumHands:1, modelComplexity:0, minDetectionConfidence:0.7, minTrackingConfidence:0.5});

  handsModel.onResults(res => {
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.save(); ctx.translate(canvas.width,0); ctx.scale(-1,1);

    if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
      const lm = res.multiHandLandmarks[0];
      drawHand(ctx, lm, canvas.width, canvas.height);
      applyGesture(countFingers(lm));
    } else { applyGesture(0); }
    ctx.restore();
  });
  new Camera(video, {onFrame: async ()=>{ await handsModel.send({image:video});}, width:640, height:480}).start();
}

// Improved Robust Finger Counting
function countFingers(lm) {
  let count = 0;
  const dist = (a, b) => Math.hypot(lm[a].x - lm[b].x, lm[a].y - lm[b].y);
  
  // Thumb logic: Is tip(4) further from pinky base(17) than the thumb joint(3)?
  // This works regardless of hand rotation/mirroring.
  if (dist(4, 17) > dist(3, 17)) count++;
  
  // Other fingers (tip vs PIP joint Y axis)
  const tips = [8, 12, 16, 20], pips = [6, 10, 14, 18];
  for (let i = 0; i < 4; i++) {
    // If the tip is significantly higher than the joint (smaller Y value)
    if (lm[tips[i]].y < lm[pips[i]].y - 0.02) count++;
  }
  return count;
}

function applyGesture(count) {
  if (!gestureMode) return;
  document.getElementById('finger-count-display').textContent = count;
  const labels = ['STOP','FORWARD','REVERSE','TURN LEFT','TURN RIGHT'];
  document.getElementById('gesture-label').textContent = labels[count] || 'STOP';

  if (count !== lastFingerCount) {
    lastFingerCount = count;
    throttleVal = steerVal = 0;
    if (count === 1) throttleVal = 80;
    else if (count === 2) throttleVal = -80;
    else if (count === 3) steerVal = -80;
    else if (count === 4) steerVal = 80;
  }
}

function drawHand(ctx, lm, w, h) {
  const cx = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
  ctx.strokeStyle = '#00d2ff'; ctx.lineWidth = 3;
  for (const [a,b] of cx) { ctx.beginPath(); ctx.moveTo(lm[a].x*w,lm[a].y*h); ctx.lineTo(lm[b].x*w,lm[b].y*h); ctx.stroke(); }
  for (const p of lm) { ctx.beginPath(); ctx.arc(p.x*w, p.y*h, 5, 0, Math.PI*2); ctx.fillStyle='#10b981'; ctx.fill(); }
}

async function goFullscreen() {
  if (!document.fullscreenElement) {
    await document.documentElement.requestFullscreen?.().catch(()=>{});
    screen.orientation?.lock('landscape').catch(()=>{});
  } else document.exitFullscreen?.();
}
